<!-- Code block styling: ensure listing-style plain blocks have visible contrast -->
<style>
  /* Plain code blocks (no language tag) — listing and sample output */
  .highlight-rouge pre.highlight,
  div.highlighter-rouge pre.highlight,
  pre.highlight {
    background-color: #1a1f2e;
    border: 1px solid #2d3348;
    border-radius: 4px;
  }
  /* Ensure monospace output (no syntax class) reads clearly */
  code.language-text,
  code.language-plaintext,
  pre > code:not([class]) {
    background-color: #1a1f2e;
    color: #c8d0e0;
  }
</style>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}" />

<!-- Mermaid.js diagram support -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false, theme: 'dark' });

  document.addEventListener('DOMContentLoaded', function () {
    // Kramdown wraps fenced blocks in <pre><code class="language-mermaid">
    // Convert these to <div class="mermaid"> for Mermaid to process
    document.querySelectorAll('code.language-mermaid').forEach(function (el) {
      const pre = el.parentElement;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = el.textContent;
      pre.replaceWith(div);
    });
    mermaid.run();
  });
</script>
