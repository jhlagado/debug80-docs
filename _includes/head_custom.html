<!-- Fonts: Source Serif 4 (body). Code uses system monospace fonts. -->
<!-- preconnect shaves ~100 ms off the first font request     -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,300;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}" />

<!-- Mermaid.js diagram support -->
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
  mermaid.initialize({ startOnLoad: false, theme: 'default' });

  document.addEventListener('DOMContentLoaded', function () {
    // Kramdown wraps fenced blocks in <pre><code class="language-mermaid">
    // Convert these to <div class="mermaid"> for Mermaid to process
    document.querySelectorAll('code.language-mermaid').forEach(function (el) {
      const pre = el.parentElement;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = el.textContent;
      pre.replaceWith(div);
    });
    mermaid.run();

    const contentImages = Array.from(document.querySelectorAll('.main-content img'));
    if (contentImages.length) {
      const lightbox = document.createElement('div');
      lightbox.className = 'image-lightbox';
      lightbox.setAttribute('role', 'dialog');
      lightbox.setAttribute('aria-modal', 'true');
      lightbox.setAttribute('aria-label', 'Image preview');
      lightbox.hidden = true;
      lightbox.innerHTML = [
        '<button class="image-lightbox__close" type="button" aria-label="Close image preview">&times;</button>',
        '<figure class="image-lightbox__figure">',
        '<img class="image-lightbox__image" alt="">',
        '<figcaption class="image-lightbox__caption"></figcaption>',
        '</figure>'
      ].join('');
      document.body.appendChild(lightbox);

      const previewImage = lightbox.querySelector('.image-lightbox__image');
      const caption = lightbox.querySelector('.image-lightbox__caption');
      const closeButton = lightbox.querySelector('.image-lightbox__close');
      let lastFocused = null;
      let previousScrollY = 0;

      function closeLightbox() {
        lightbox.hidden = true;
        document.documentElement.classList.remove('has-image-lightbox');
        document.body.classList.remove('has-image-lightbox');
        document.body.style.top = '';
        previewImage.removeAttribute('src');
        previewImage.alt = '';
        caption.textContent = '';
        if (lastFocused) {
          lastFocused.focus({ preventScroll: true });
          lastFocused = null;
        }
        window.scrollTo({ top: previousScrollY, left: 0, behavior: 'instant' });
      }

      function openLightbox(img) {
        lastFocused = document.activeElement;
        previousScrollY = window.scrollY || window.pageYOffset || 0;
        previewImage.src = img.currentSrc || img.src;
        previewImage.alt = img.alt || '';
        caption.textContent = img.alt || '';
        caption.hidden = !img.alt;
        document.body.style.top = '-' + previousScrollY + 'px';
        lightbox.hidden = false;
        document.documentElement.classList.add('has-image-lightbox');
        document.body.classList.add('has-image-lightbox');
      }

      contentImages.forEach(function (img) {
        if (img.closest('a')) return;
        img.classList.add('js-lightbox-image');
        img.setAttribute('tabindex', '0');
        img.setAttribute('role', 'button');
        img.setAttribute('aria-label', (img.alt ? 'Open image preview: ' + img.alt : 'Open image preview'));
        img.addEventListener('click', function () { openLightbox(img); });
        img.addEventListener('keydown', function (event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            openLightbox(img);
          }
        });
      });

      closeButton.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', function (event) {
        if (event.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', function (event) {
        if (!lightbox.hidden && event.key === 'Escape') closeLightbox();
      });
    }
  });
</script>
