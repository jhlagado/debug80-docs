<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Black background -->
  <rect width="24" height="24" fill="#000000"/>
  <!-- Chip body -->
  <rect x="5" y="5" width="14" height="14" rx="1.5" stroke="#ffffff" stroke-width="1.5" fill="none"/>
  <!-- Pins left -->
  <line x1="2" y1="9" x2="5" y2="9" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="2" y1="12" x2="5" y2="12" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="2" y1="15" x2="5" y2="15" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Pins right -->
  <line x1="19" y1="9" x2="22" y2="9" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="19" y1="12" x2="22" y2="12" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="19" y1="15" x2="22" y2="15" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Pins top -->
  <line x1="9" y1="2" x2="9" y2="5" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="12" y1="2" x2="12" y2="5" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="15" y1="2" x2="15" y2="5" stroke="#ffffff" stroke-width="1.5"/>
  <!-- Pins bottom -->
  <line x1="9" y1="19" x2="9" y2="22" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="12" y1="19" x2="12" y2="22" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="15" y1="19" x2="15" y2="22" stroke="#ffffff" stroke-width="1.5"/>
  <!-- "80" text -->
  <text x="12" y="13.5" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#ffffff">80</text>
</svg>
