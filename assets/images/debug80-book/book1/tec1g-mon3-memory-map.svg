<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" viewBox="0 0 820 420" role="img" aria-labelledby="title desc">
  <title id="title">TEC-1G MON-3 memory shape</title>
  <desc id="desc">A simplified memory map showing MON-3 monitor ROM, lower RAM, user program area at 0x4000 and upper memory.</desc>
  <defs>
    <style>
      .axis { stroke: #3b5568; stroke-width: 2; }
      .block { stroke: #2f5d7c; stroke-width: 2; rx: 8; }
      .rom { fill: #fff1f1; }
      .ram { fill: #f7fbff; }
      .user { fill: #eef8ef; }
      .exp { fill: #fff8e8; }
      .label { font: 700 20px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17212b; }
      .body { font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #304050; }
      .addr { font: 700 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #304050; }
    </style>
  </defs>
  <rect width="820" height="420" fill="#ffffff"/>
  <text class="label" x="255" y="38">TEC-1G / MON-3 Memory Shape</text>
  <line class="axis" x1="180" y1="70" x2="180" y2="360"/>
  <text class="addr" x="80" y="82">0x0000</text>
  <text class="addr" x="80" y="168">0x0800</text>
  <text class="addr" x="80" y="252">0x4000</text>
  <text class="addr" x="80" y="362">0xFFFF</text>
  <rect class="block rom" x="180" y="70" width="470" height="80"/>
  <text class="label" x="215" y="108">Monitor ROM and system area</text>
  <text class="body" x="215" y="132">MON-3 profile support code and low memory behaviour</text>
  <rect class="block ram" x="180" y="160" width="470" height="74"/>
  <text class="label" x="215" y="198">RAM and monitor workspace</text>
  <text class="body" x="215" y="220">Used according to the active profile</text>
  <rect class="block user" x="180" y="244" width="470" height="74"/>
  <text class="label" x="215" y="282">User program area</text>
  <text class="body" x="215" y="304">Book 1 starter program begins at 0x4000</text>
  <rect class="block exp" x="180" y="328" width="470" height="42"/>
  <text class="label" x="215" y="356">Upper RAM, banks and expansion state</text>
</svg>
