<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">Source line to breakpoint address</title>
  <desc id="desc">Debug80 uses the source map to connect a source line with the Z80 address used by a breakpoint.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b5568"/>
    </marker>
    <style>
      .box { fill: #f7fbff; stroke: #2f5d7c; stroke-width: 2; rx: 8; }
      .map { fill: #eef8ef; stroke: #3d7a44; stroke-width: 2; rx: 8; }
      .stop { fill: #fff1f1; stroke: #b33a3a; stroke-width: 2; rx: 8; }
      .label { font: 700 21px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17212b; }
      .body { font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #304050; }
      .arrow { stroke: #3b5568; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="960" height="260" fill="#ffffff"/>
  <rect class="box" x="42" y="72" width="190" height="112"/>
  <text class="label" x="78" y="113">Source line</text>
  <text class="body" x="72" y="145">start: NOP</text>
  <text class="body" x="72" y="167">src/main.asm</text>
  <path class="arrow" d="M 237 128 H 315"/>
  <rect class="map" x="320" y="72" width="190" height="112"/>
  <text class="label" x="357" y="113">Source map</text>
  <text class="body" x="355" y="145">Line to address</text>
  <text class="body" x="355" y="167">Symbol records</text>
  <path class="arrow" d="M 515 128 H 595"/>
  <rect class="box" x="600" y="72" width="150" height="112"/>
  <text class="label" x="634" y="113">Address</text>
  <text class="body" x="647" y="145">0x4000</text>
  <text class="body" x="638" y="167">Z80 PC</text>
  <path class="arrow" d="M 755 128 H 815"/>
  <rect class="stop" x="820" y="72" width="100" height="112"/>
  <text class="label" x="844" y="113">Stop</text>
  <text class="body" x="841" y="145">Bound</text>
  <text class="body" x="835" y="167">breakpoint</text>
</svg>
