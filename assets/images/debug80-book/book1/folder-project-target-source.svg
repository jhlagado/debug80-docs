<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">Folder to source file relationship</title>
  <desc id="desc">A Debug80 workspace folder contains a Debug80 project. The project selects a target, and the target names the source file that AZM assembles.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b5568"/>
    </marker>
    <style>
      .box { fill: #f7fbff; stroke: #2f5d7c; stroke-width: 2; rx: 8; }
      .accent { fill: #fff8e8; stroke: #9a6a12; stroke-width: 2; rx: 8; }
      .label { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17212b; }
      .body { font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #304050; }
      .arrow { stroke: #3b5568; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="960" height="260" fill="#ffffff"/>
  <rect class="box" x="40" y="70" width="190" height="110"/>
  <text class="label" x="70" y="112">Folder</text>
  <text class="body" x="70" y="142">Opened in VS Code</text>
  <text class="body" x="70" y="164">Selected in Debug80</text>
  <path class="arrow" d="M 235 125 H 315"/>
  <rect class="box" x="320" y="70" width="190" height="110"/>
  <text class="label" x="350" y="112">Project</text>
  <text class="body" x="350" y="142">debug80.json</text>
  <text class="body" x="350" y="164">Profiles and targets</text>
  <path class="arrow" d="M 515 125 H 595"/>
  <rect class="accent" x="600" y="70" width="150" height="110"/>
  <text class="label" x="633" y="112">Target</text>
  <text class="body" x="630" y="142">Active program</text>
  <text class="body" x="630" y="164">Build settings</text>
  <path class="arrow" d="M 755 125 H 815"/>
  <rect class="box" x="820" y="70" width="100" height="110"/>
  <text class="label" x="838" y="112">Source</text>
  <text class="body" x="842" y="142">main.asm</text>
  <text class="body" x="842" y="164">or .z80</text>
</svg>
