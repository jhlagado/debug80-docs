<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">Emulator serial path and CoolTerm hardware path</title>
  <desc id="desc">The Debug80 Serial panel sends data to the emulator. Send to Board uses CoolTerm to send the HEX file to TEC-1G hardware.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b5568"/>
    </marker>
    <style>
      .box { fill: #f7fbff; stroke: #2f5d7c; stroke-width: 2; rx: 8; }
      .cool { fill: #fff8e8; stroke: #9a6a12; stroke-width: 2; rx: 8; }
      .board { fill: #eef8ef; stroke: #3d7a44; stroke-width: 2; rx: 8; }
      .label { font: 700 22px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17212b; }
      .body { font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #304050; }
      .arrow { stroke: #3b5568; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .lane { font: 700 18px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5a6670; }
    </style>
  </defs>
  <rect width="960" height="360" fill="#ffffff"/>
  <text class="lane" x="54" y="54">Emulator path</text>
  <rect class="box" x="55" y="75" width="220" height="90"/>
  <text class="label" x="92" y="113">Serial panel</text>
  <text class="body" x="92" y="140">Input, output, files</text>
  <path class="arrow" d="M 280 120 H 395"/>
  <rect class="board" x="400" y="75" width="230" height="90"/>
  <text class="label" x="460" y="113">Emulator</text>
  <text class="body" x="450" y="140">Active debug session</text>
  <text class="lane" x="54" y="220">Hardware path</text>
  <rect class="box" x="55" y="242" width="170" height="80"/>
  <text class="label" x="91" y="279">.hex file</text>
  <path class="arrow" d="M 230 282 H 325"/>
  <rect class="cool" x="330" y="242" width="190" height="80"/>
  <text class="label" x="383" y="279">CoolTerm</text>
  <path class="arrow" d="M 525 282 H 625"/>
  <rect class="board" x="630" y="242" width="230" height="80"/>
  <text class="label" x="692" y="279">TEC-1G</text>
  <text class="body" x="676" y="304">Physical hardware</text>
</svg>
