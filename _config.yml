title: debug80 Docs
description: Technical documentation for the debug80 Z80 debugger extension
baseurl: "/debug80-docs"
url: "https://jhlagado.github.io"

theme: just-the-docs

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

# Just the Docs settings
search_enabled: true
search:
  heading_level: 2
  previews: 2

heading_anchors: true

aux_links:
  "debug80 on GitHub":
    - "https://github.com/jhlagado/debug80"
aux_links_new_tab: true

nav_sort: order   # use nav_order frontmatter

color_scheme: dark

footer_content: 'debug80 documentation &mdash; <a href="https://github.com/jhlagado/debug80">source on GitHub</a>'

back_to_top: true
back_to_top_text: "Back to top"

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
